  <line x1="268" y1="119" x2="280" y2="119" stroke="#D4A9A3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="268" y1="126" x2="278" y2="126" stroke="#D4A9A3" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="270" y="94" width="16" height="8" rx="2" fill="#C4918A" opacity="0.3"/>
