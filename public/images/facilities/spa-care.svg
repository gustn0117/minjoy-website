  <line x1="175" y1="175" x2="220" y2="180" stroke="#C4918A" stroke-width="3" stroke-linecap="round" opacity="0.06"/>
  <!-- Pillow -->
  <ellipse cx="155" cy="155" rx="15" ry="6" fill="#D4A9A3" opacity="0.15"/>
