  <path d="M100 175 Q100 80 200 75 Q300 80 300 175" fill="white" stroke="#D4A9A3" stroke-width="1.5"/>
  <path d="M110 175 Q110 90 200 85 Q290 90 290 175" fill="#C4918A" opacity="0.04"/>
