  <rect x="280" y="100" width="30" height="40" rx="4" fill="white" stroke="#C4918A" stroke-width="1.5"/>
  <rect x="285" y="106" width="20" height="10" rx="2" fill="#C4918A" opacity="0.15"/>
  <circle cx="290" cy="126" r="3" fill="#C4918A" opacity="0.4"/>
  <circle cx="300" cy="126" r="3" fill="#D4A9A3" opacity="0.3"/>
