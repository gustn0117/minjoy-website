  <path d="M200 60 Q205 50 200 40" stroke="#C4918A" stroke-width="1.5" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M215 65 Q220 52 215 42" stroke="#D4A9A3" stroke-width="1.5" fill="none" opacity="0.12" stroke-linecap="round"/>
  <path d="M185 63 Q190 50 185 38" stroke="#D4A9A3" stroke-width="1.5" fill="none" opacity="0.12" stroke-linecap="round"/>
  <!-- Sparkle accents -->
  <path d="M120 50 L121 54 L125 55 L121 56 L120 60 L119 56 L115 55 L119 54 Z" fill="#C4918A" opacity="0.2"/>
  <path d="M310 65 L311 68 L314 69 L311 70 L310 73 L309 70 L306 69 L309 68 Z" fill="#D4A9A3" opacity="0.15"/>
  <!-- Bed legs -->
  <rect x="120" y="210" width="6" height="20" rx="2" fill="#D4A9A3" opacity="0.3"/>
  <rect x="274" y="210" width="6" height="20" rx="2" fill="#D4A9A3" opacity="0.3"/>
