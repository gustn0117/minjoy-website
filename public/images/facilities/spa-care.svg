<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="0" fill="#FBF5F4"/>
  <rect x="0" y="250" width="400" height="50" fill="#F5E8E6"/>
