  <line x1="180" y1="122" x2="210" y2="122" stroke="#D4A9A3" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="129" x2="215" y2="129" stroke="#D4A9A3" stroke-width="1.5" stroke-linecap="round"/>
