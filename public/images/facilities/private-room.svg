<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="0" fill="#FBF5F4"/>
  <rect x="0" y="250" width="400" height="50" fill="#F5E8E6"/>
  <!-- Sliding door frame -->
  <rect x="60" y="40" width="120" height="210" rx="0" fill="#8B7670" opacity="0.15"/>
  <rect x="65" y="45" width="55" height="200" rx="0" fill="white" opacity="0.6"/>
  <rect x="122" y="45" width="55" height="200" rx="0" fill="#D4A9A3" opacity="0.08"/>
  <!-- Door handle -->
  <rect x="115" y="135" width="4" height="20" rx="2" fill="#C4918A" opacity="0.5"/>
  <!-- Room name -->
  <rect x="75" y="25" width="90" height="14" rx="3" fill="#C4918A" opacity="0.1"/>
  <text x="120" y="35" font-family="Arial" font-size="8" fill="#C4918A" text-anchor="middle" opacity="0.5">PRIVATE ROOM</text>
  <!-- Bed inside -->
  <rect x="200" y="155" width="150" height="12" rx="6" fill="white" stroke="#D4A9A3" stroke-width="1.5"/>
  <rect x="210" y="145" width="35" height="12" rx="6" fill="#D4A9A3" opacity="0.3"/>
  <rect x="255" y="148" width="85" height="10" rx="3" fill="#6B4F47" opacity="0.1"/>
  <rect x="220" y="167" width="5" height="30" rx="2" fill="#D4A9A3" opacity="0.3"/>
  <rect x="330" y="167" width="5" height="30" rx="2" fill="#D4A9A3" opacity="0.3"/>
  <!-- Side cabinet -->
  <rect x="300" y="90" width="50" height="60" rx="4" fill="#8B7670" opacity="0.1"/>
  <rect x="305" y="95" width="40" height="25" rx="2" fill="white" opacity="0.4"/>
  <rect x="305" y="125" width="40" height="20" rx="2" fill="white" opacity="0.4"/>
  <!-- Aromatherapy bottle -->
  <rect x="313" y="78" width="12" height="16" rx="3" fill="#C4918A" opacity="0.3"/>
  <rect x="316" y="74" width="6" height="6" rx="2" fill="#B07D76" opacity="0.3"/>
  <!-- Towel -->
  <rect x="330" y="100" width="12" height="8" rx="2" fill="#D4A9A3" opacity="0.25"/>
  <!-- Ambient dots -->
  <circle cx="250" cy="60" r="2" fill="#C4918A" opacity="0.15"/>
  <circle cx="290" cy="50" r="1.5" fill="#D4A9A3" opacity="0.15"/>
  <circle cx="340" cy="55" r="1.5" fill="#C4918A" opacity="0.1"/>
</svg>
